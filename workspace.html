<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPAce Workspace</title>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="GPAce Workspace - A rich text editor with speech-to-text, text-to-speech, and document export capabilities.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/workspace.css" rel="stylesheet">
    <link href="css/components/navigation.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">

    <!-- DOMPurify for XSS Protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
</head>

<body>
    <!-- Main Content -->
    <main id="main-content" class="workspace-layout">

        <!-- Focus Zone (Center - Fluid) -->
        <section class="focus-zone">
            <div class="editor-container">
                <!-- Unified Ribbon Toolbar -->
                <div class="toolbar-container" role="toolbar" aria-label="Document editing tools">
                    <div class="toolbar-ribbon">
                        <!-- Group 1: File & History -->
                        <div class="toolbar-section" aria-label="File & History">
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-tooltip="New Document (Ctrl+N)" aria-label="New Document">
                                    <i class="bi bi-file-earmark-plus"></i>
                                </button>
                                <button class="toolbar-button" data-tooltip="Open (Ctrl+O)" aria-label="Open file">
                                    <i class="bi bi-folder2-open"></i>
                                </button>
                                <button class="toolbar-button" data-tooltip="Save (Ctrl+S)" aria-label="Save document">
                                    <i class="bi bi-save"></i>
                                </button>
                            </div>
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-tooltip="Undo (Ctrl+Z)" aria-label="Undo">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                                <button class="toolbar-button" data-tooltip="Redo (Ctrl+Y)" aria-label="Redo">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 2: Font & Size -->
                        <div class="toolbar-section" aria-label="Font Settings">
                            <div class="toolbar-group">
                                <label for="fontFamily" class="visually-hidden">Font Family</label>
                                <select class="toolbar-select font-family" id="fontFamily" name="fontFamily" aria-label="Font family">
                                    <option value="Inter">Inter</option>
                                    <option value="Arial">Arial</option>
                                    <option value="Helvetica">Helvetica</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Georgia">Georgia</option>
                                    <option value="Courier New">Courier New</option>
                                </select>
                                <label for="fontSize" class="visually-hidden">Font Size</label>
                                <select class="toolbar-select font-size" id="fontSize" name="fontSize" aria-label="Font size">
                                    <option value="8">8</option>
                                    <option value="10">10</option>
                                    <option value="12" selected>12</option>
                                    <option value="14">14</option>
                                    <option value="16">16</option>
                                    <option value="18">18</option>
                                    <option value="24">24</option>
                                    <option value="36">36</option>
                                </select>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 3: Text Style -->
                        <div class="toolbar-section" aria-label="Text Styling">
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-format="bold" data-tooltip="Bold (Ctrl+B)">
                                    <i class="bi bi-type-bold"></i>
                                </button>
                                <button class="toolbar-button" data-format="italic" data-tooltip="Italic (Ctrl+I)">
                                    <i class="bi bi-type-italic"></i>
                                </button>
                                <button class="toolbar-button" data-format="underline" data-tooltip="Underline (Ctrl+U)">
                                    <i class="bi bi-type-underline"></i>
                                </button>
                                <button class="toolbar-button" data-format="strike" data-tooltip="Strikethrough">
                                    <i class="bi bi-type-strikethrough"></i>
                                </button>
                            </div>
                            <div class="toolbar-group color-group">
                                <div class="color-picker-wrapper" data-tooltip="Text Color">
                                    <label for="textColor" class="visually-hidden">Text Color</label>
                                    <i class="bi bi-palette-fill" aria-hidden="true"></i>
                                    <input type="color" class="toolbar-color-picker" id="textColor" name="textColor" value="#F5F5F7">
                                </div>
                                <div class="color-picker-wrapper" data-tooltip="Highlight Color">
                                    <label for="backgroundColor" class="visually-hidden">Highlight Color</label>
                                    <i class="bi bi-pencil-fill" aria-hidden="true"></i>
                                    <input type="color" class="toolbar-color-picker" id="backgroundColor" name="backgroundColor" value="#000000">
                                </div>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 4: Paragraph -->
                        <div class="toolbar-section" aria-label="Alignment">
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-format="alignLeft" data-tooltip="Align Left">
                                    <i class="bi bi-text-left"></i>
                                </button>
                                <button class="toolbar-button" data-format="alignCenter" data-tooltip="Align Center">
                                    <i class="bi bi-text-center"></i>
                                </button>
                                <button class="toolbar-button" data-format="alignRight" data-tooltip="Align Right">
                                    <i class="bi bi-text-right"></i>
                                </button>
                                <button class="toolbar-button" data-format="justify" data-tooltip="Justify">
                                    <i class="bi bi-justify"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 5: Insert (Moved from sidebar) -->
                        <div class="toolbar-section" aria-label="Insert">
                            <div class="toolbar-group">
                                <div class="editor-dropdown">
                                    <button class="toolbar-button" data-tooltip="Insert Image">
                                        <i class="bi bi-image"></i>
                                    </button>
                                    <div class="image-options-dropdown" id="imageOptionsDropdown">
                                        <div class="dropdown-item" id="uploadImageBtn">
                                            <i class="bi bi-upload"></i> Upload from Computer
                                        </div>
                                        <div class="dropdown-item" id="openGooglePickerBtn">
                                            <i class="bi bi-google"></i> Google Drive
                                        </div>
                                        <div class="dropdown-item" id="insertImageUrlBtn">
                                            <i class="bi bi-link-45deg"></i> Image URL
                                        </div>
                                    </div>
                                </div>
                                <button class="toolbar-button" data-tooltip="Insert Link">
                                    <i class="bi bi-link-45deg"></i>
                                </button>
                                <button id="insertTableBtn" class="toolbar-button" data-tooltip="Insert Table">
                                    <i class="bi bi-table"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 6: AI & Voice (Moved from sidebar) -->
                        <div class="toolbar-section" aria-label="AI & Voice">
                            <div class="toolbar-group">
                                <button id="speechRecognitionBtn" class="toolbar-button ai-btn" data-tooltip="Live Dictation">
                                    <i class="bi bi-mic-fill"></i>
                                </button>
                                <button id="summarizeBtn" class="toolbar-button ai-btn" data-tooltip="AI Summarize" disabled>
                                    <i class="bi bi-lightning-charge-fill"></i>
                                </button>
                                <button id="textToSpeechBtn" class="toolbar-button" data-tooltip="Read Aloud">
                                    <i class="bi bi-volume-up-fill"></i>
                                </button>
                                <button id="stopTextToSpeechBtn" class="toolbar-button" data-tooltip="Stop Reading" disabled>
                                    <i class="bi bi-stop-circle"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 7: Export (Moved from sidebar) -->
                        <div class="toolbar-section" aria-label="Export">
                            <div class="toolbar-group">
                                <button id="exportPdfBtn" class="toolbar-button export-btn" data-tooltip="Export as PDF">
                                    <i class="bi bi-file-pdf-fill"></i>
                                </button>
                                <button id="exportWordBtn" class="toolbar-button export-btn" data-tooltip="Export as Word">
                                    <i class="bi bi-file-word-fill"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 8: Timer (Moved from sidebar) -->
                        <div class="toolbar-section" aria-label="Timer">
                            <div class="toolbar-group timer-compact">
                                <div id="timer" class="timer-digits-compact">25:00</div>
                                <div class="timer-dots" style="display: none;">
                                    <span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
                                </div>
                                <button id="startBtn" class="toolbar-button" title="Start/Pause">
                                    <i class="bi bi-play-fill"></i>
                                </button>
                                <button id="resetBtn" class="toolbar-button" title="Reset">
                                    <i class="bi bi-arrow-counterclockwise"></i>
                                </button>
                            </div>
                        </div>

                        <div class="toolbar-divider"></div>

                        <!-- Group 9: Task Selection (Moved from sidebar) -->
                        <div class="toolbar-section" aria-label="Task">
                            <div class="toolbar-group">
                                <label for="taskSelector" class="visually-hidden">Select Task</label>
                                <select id="taskSelector" name="task" class="toolbar-select task-select-compact">
                                    <option value="">Select a task...</option>
                                </select>
                                <button id="toggleTaskExtrasBtn" class="toolbar-button" data-tooltip="Toggle Task Resources">
                                    <i class="bi bi-folder2-open"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <span id="recordingTimer" class="recording-timer" style="display: none;" aria-live="polite">00:00:00</span>
                </div>

                <!-- Editor Content Area -->
                <div class="editor-content" id="editorContainer">
                    <div id="editor" role="textbox" aria-multiline="true" aria-label="Document editor"></div>
                    <div id="dropZone" class="drop-zone" aria-label="Drop files here to upload">
                        <i class="bi bi-cloud-upload" aria-hidden="true"></i>
                        <span>Drop files here</span>
                    </div>

                    <!-- Task Extras (Attachments & Energy - Moved from sidebar) -->
                    <div id="taskExtrasPanel" class="task-extras-panel">
                        <div class="task-extras-header">
                            <label class="extras-label">TASK RESOURCES & INSIGHTS</label>
                            <div class="extras-controls">
                                <button id="closeExtrasBtn" class="close-extras-btn" title="Toggle Resources">
                                    <i class="bi bi-chevron-down"></i>
                                </button>
                            </div>
                        </div>
                        <div class="task-extras-content">
                            <div class="extras-grid">
                                <!-- Energy Graph -->
                                <div class="energy-section-compact">
                                    <h4>Energy Level</h4>
                                    <div class="energy-graph-container-compact">
                                        <canvas id="energyGraph"></canvas>
                                    </div>
                                </div>
                                <!-- Attachments Container -->
                                <div class="attachments-section-compact">
                                    <h4>Attachments</h4>
                                    <div id="attachmentsContainer" class="attachments-container" role="list">
                                        <div class="no-attachments-message">
                                            <i class="bi bi-folder2-open"></i>
                                            <p>Select a task to view its files</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Status Bar -->
                <div class="editor-statusbar" role="status" aria-live="polite">
                    <div class="statusbar-left">
                        <div class="status-item">
                            <i class="bi bi-pencil" aria-hidden="true"></i>
                            <span id="editorWordCount">0 words</span>
                        </div>
                        <div class="status-item">
                            <i class="bi bi-text-paragraph" aria-hidden="true"></i>
                            <span id="editorCharCount">0 characters</span>
                        </div>
                    </div>
                    <div class="statusbar-right">
                        <div class="status-item zoom-controls">
                            <button class="toolbar-button" data-tooltip="Zoom Out" aria-label="Zoom out">
                                <i class="bi bi-zoom-out" aria-hidden="true"></i>
                            </button>
                            <span id="zoomLevel">100%</span>
                            <button class="toolbar-button" data-tooltip="Zoom In" aria-label="Zoom in">
                                <i class="bi bi-zoom-in" aria-hidden="true"></i>
                            </button>
                        </div>
                        <div class="status-item">
                            <i class="bi bi-clock" aria-hidden="true"></i>
                            <span id="editorLastSaved">Never saved</span>
                        </div>
                        <div class="status-item">
                            <button id="toggleAttachmentsBtn" class="toolbar-button" data-tooltip="Toggle Task Resources" aria-label="Toggle Task Resources">
                                <i class="bi bi-folder2-open" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Message Container -->
            <div id="statusMessage" class="status-message" style="display: none;" role="alert" aria-live="assertive">
            </div>
        </section>
    </main>

    <!-- Mobile Tab Bar -->
    <nav class="mobile-tab-bar">
        <button class="tab-item" id="mobileDictateBtn" aria-label="Dictate">
            <i class="bi bi-mic-fill"></i>
            <span>Dictate</span>
        </button>
        <button class="tab-item" id="mobileSummarizeBtn" aria-label="Summarize">
            <i class="bi bi-lightning-charge-fill"></i>
            <span>Summarize</span>
        </button>
        <button class="tab-item" id="mobileInsertBtn" aria-label="Insert Image">
            <i class="bi bi-image"></i>
            <span>Insert</span>
        </button>
        <button class="tab-item" id="mobileExportBtn" aria-label="Export PDF">
            <i class="bi bi-file-pdf-fill"></i>
            <span>Export</span>
        </button>
    </nav>

    <!-- Fatigue Modal -->
    <div id="fatigueModal" class="modal-overlay" style="display: none;">
        <div class="modal-content bento-modal">
            <div class="modal-header">
                <h2>Energy Level Check</h2>
                <p>How are you feeling before starting this session?</p>
            </div>
            <div class="fatigue-grid">
                <div class="fatigue-level" data-level="1">😫 Exhausted</div>
                <div class="fatigue-level" data-level="4">😐 Okay</div>
                <div class="fatigue-level" data-level="7">🚀 God mode</div>
            </div>
            <div class="modal-footer">
                <button id="cancelFatigue" class="btn-ghost">Skip</button>
                <button id="confirmFatigue" class="btn-primary" disabled>Start Session</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/inject-header.js"></script>
    <script type="module" src="js/sideDrawer.js"></script>
    <script type="module" src="js/core/TaskSystemLoader.js"></script>
    <script type="module" src="js/services/StorageService.js"></script>
    <script type="module" src="js/services/SecureStorage.js"></script>
    <script type="module" src="js/utils/Sanitizer.js"></script>
    <script type="module" src="js/utils/Logger.js"></script>
    <script type="module" src="js/controllers/TimerController.js"></script>
    <script type="module" src="js/controllers/EnergyController.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script type="module">
        import DataInitializationService from './js/services/DataInitializationService.js';
        document.addEventListener('DOMContentLoaded', async () => {
            await DataInitializationService.init();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/workspace-attachments.js"></script>
    <script src="js/taskLinks.js"></script>



    <script type="module">
        import * as Workspace from './js/workspace/index.js';
        window.Workspace = Workspace;
    </script>

    <script type="module" src="js/workspaceFlashcardIntegration.js"></script>
    <script type="module" src="js/sm2.js"></script>
    <script type="module" src="js/cross-tab-sync.js"></script>
</body>

</html>
