<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Manifest & Branding -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b18">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/gpace-logo-white.png">
    <title>GPAce Workspace</title>
    

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="GPAce Workspace - A rich text editor with speech-to-text, text-to-speech, and document export capabilities.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/workspace.css" rel="stylesheet">
    <link href="css/components/navigation.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">

    <!-- DOMPurify for XSS Protection -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js" crossorigin="anonymous"
        referrerpolicy="no-referrer"></script>
</head>

<body>
    <!-- Main Content -->
    <main id="main-content" class="workspace-layout">

        <!-- Focus Zone (Center - Fluid) -->
        <section class="focus-zone">
            <div class="editor-container">
                <!-- Unified Ribbon Toolbar -->
                <!-- Unified Bento Toolbar -->
                <div class="toolbar-container" role="toolbar" aria-label="Document editing tools">
                    <div class="toolbar-ribbon">
                        <!-- Bento Block 1: File & Edit -->
                        <div class="bento-toolbar-section" aria-label="Document">
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-tooltip="New (Ctrl+N)"><i class="bi bi-file-earmark-plus"></i></button>
                                <button class="toolbar-button" data-tooltip="Open (Ctrl+O)"><i class="bi bi-folder2-open"></i></button>
                                <button class="toolbar-button" data-tooltip="Save (Ctrl+S)"><i class="bi bi-save"></i></button>
                            </div>
                            <div class="toolbar-divider"></div>
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-tooltip="Undo (Ctrl+Z)"><i class="bi bi-arrow-counterclockwise"></i></button>
                                <button class="toolbar-button" data-tooltip="Redo (Ctrl+Y)"><i class="bi bi-arrow-clockwise"></i></button>
                            </div>
                        </div>

                        <!-- Bento Block 2: Typography -->
                        <div class="bento-toolbar-section" aria-label="Typography">
                            <div class="toolbar-group">
                                <select class="toolbar-select font-family" id="fontFamily" aria-label="Font family">
                                    <option value="Inter">Inter</option>
                                    <option value="Arial">Arial</option>
                                    <option value="Helvetica">Helvetica</option>
                                    <option value="Times New Roman">Times New Roman</option>
                                    <option value="Georgia">Georgia</option>
                                    <option value="Courier New">Courier New</option>
                                </select>
                                <select class="toolbar-select font-size" id="fontSize" aria-label="Font size">
                                    <option value="8">8</option><option value="10">10</option><option value="12" selected>12</option>
                                    <option value="14">14</option><option value="16">16</option><option value="18">18</option>
                                    <option value="24">24</option><option value="36">36</option>
                                </select>
                            </div>
                            <div class="toolbar-divider"></div>
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-format="bold" data-tooltip="Bold"><i class="bi bi-type-bold"></i></button>
                                <button class="toolbar-button" data-format="italic" data-tooltip="Italic"><i class="bi bi-type-italic"></i></button>
                                <button class="toolbar-button" data-format="underline" data-tooltip="Underline"><i class="bi bi-type-underline"></i></button>
                                <div class="color-picker-wrapper" data-tooltip="Text Color">
                                    <i class="bi bi-palette-fill"></i>
                                    <input type="color" class="toolbar-color-picker" id="textColor" value="#F5F5F7">
                                </div>
                            </div>
                        </div>

                        <!-- Bento Block 3: Alignment -->
                        <div class="bento-toolbar-section" aria-label="Layout">
                            <div class="toolbar-group">
                                <button class="toolbar-button" data-format="alignLeft" data-tooltip="Left"><i class="bi bi-text-left"></i></button>
                                <button class="toolbar-button" data-format="alignCenter" data-tooltip="Center"><i class="bi bi-text-center"></i></button>
                                <button class="toolbar-button" data-format="alignRight" data-tooltip="Right"><i class="bi bi-text-right"></i></button>
                            </div>
                        </div>

                        <!-- Bento Block 4: Insert -->
                        <div class="bento-toolbar-section" aria-label="Insert">
                            <div class="toolbar-group">
                                <div class="editor-dropdown">
                                    <button class="toolbar-button" data-tooltip="Insert Image"><i class="bi bi-image"></i></button>
                                    <div class="image-options-dropdown" id="imageOptionsDropdown">
                                        <div class="dropdown-item" id="uploadImageBtn"><i class="bi bi-upload"></i> Upload</div>
                                        <div class="dropdown-item" id="openGooglePickerBtn"><i class="bi bi-google"></i> Drive</div>
                                        <div class="dropdown-item" id="insertImageUrlBtn"><i class="bi bi-link-45deg"></i> URL</div>
                                    </div>
                                </div>
                                <button class="toolbar-button" data-tooltip="Link"><i class="bi bi-link-45deg"></i></button>
                                <button id="insertTableBtn" class="toolbar-button" data-tooltip="Table"><i class="bi bi-table"></i></button>
                            </div>
                        </div>

                        <!-- Bento Block 5: AI & Export -->
                        <div class="bento-toolbar-section" aria-label="AI & Export">
                            <div class="toolbar-group">
                                <button id="speechRecognitionBtn" class="toolbar-button ai-btn" data-tooltip="Dictate"><i class="bi bi-mic-fill"></i></button>
                                <button id="summarizeBtn" class="toolbar-button ai-btn" data-tooltip="Summarize" disabled><i class="bi bi-lightning-charge-fill"></i></button>
                            </div>
                            <div class="toolbar-divider"></div>
                            <div class="toolbar-group">
                                <button id="exportPdfBtn" class="toolbar-button export-btn" data-tooltip="PDF"><i class="bi bi-file-pdf-fill"></i></button>
                                <button id="exportWordBtn" class="toolbar-button export-btn" data-tooltip="Word"><i class="bi bi-file-word-fill"></i></button>
                            </div>
                        </div>

                        <!-- Bento Block 6: Task & Timer -->
                        <div class="bento-toolbar-section primary" aria-label="Task Flow">
                            <div class="toolbar-group">
                                <select id="taskSelector" class="toolbar-select task-select-compact">
                                    <option value="">Select Task...</option>
                                </select>
                                <button id="toggleTaskExtrasBtn" class="toolbar-button primary-accent" data-tooltip="Task Attachments">
                                    <i class="bi bi-paperclip"></i>
                                    <span class="attachment-badge" id="attachmentCount" style="display: none;">0</span>
                                </button>
                            </div>
                            <div class="toolbar-divider"></div>
                            <div class="toolbar-group timer-compact">
                                <div id="timer" class="timer-digits-compact">25:00</div>
                                <button id="startBtn" class="toolbar-button pulse-accent"><i class="bi bi-play-fill"></i></button>
                            </div>
                        </div>
                    </div>
                    <span id="recordingTimer" class="recording-timer" style="display: none;">00:00:00</span>
                </div>

                <!-- Editor Content Area -->
                <div class="editor-content" id="editorContainer">
                    <div id="editor" role="textbox" aria-multiline="true" aria-label="Document editor"></div>
                    <div id="dropZone" class="drop-zone" aria-label="Drop files here to upload">
                        <i class="bi bi-cloud-upload" aria-hidden="true"></i>
                        <span>Drop files here</span>
                    </div>
                </div>

                <!-- Task Extras Panel (Attachments & Energy) -->
                <div id="taskExtrasPanel" class="task-extras-panel collapsed">
                    <div class="task-extras-header">
                        <span class="extras-label"><i class="bi bi-briefcase-fill"></i> Task Resources & Insights</span>
                        <button id="closeExtrasBtn" class="close-extras-btn" title="Close Panel">
                            <i class="bi bi-chevron-down"></i>
                        </button>
                    </div>
                    <div class="task-extras-content">
                        <div class="extras-grid">
                            <!-- Attachments & Links -->
                            <div class="attachments-section-compact">
                                <h4><i class="bi bi-paperclip"></i> Attachments & Links</h4>
                                <div id="attachmentsContainer" class="attachments-container">
                                    <div class="no-attachments-message">
                                        <i class="bi bi-info-circle"></i>
                                        <p>Select a task to view resources</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>


            </div>

            <!-- Status Message Container -->
            <div id="statusMessage" class="status-message" style="display: none;" role="alert" aria-live="assertive">
            </div>
        </section>
    </main>




    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/core/BootstrapManager.js"></script>
    <script type="module" src="js/inject-header.js"></script>
    <script type="module" src="js/sideDrawer.js"></script>
    <script type="module" src="js/core/TaskSystemLoader.js"></script>
    <script type="module" src="js/services/StorageService.js"></script>
    <script type="module" src="js/services/SecureStorage.js"></script>
    <script type="module" src="js/utils/Sanitizer.js"></script>
    <script type="module" src="js/utils/Logger.js"></script>
    <script type="module" src="js/controllers/TimerController.js"></script>
    <script type="module" src="js/auth.js"></script>

    <script type="module">
        import DataInitializationService from './js/services/DataInitializationService.js';
        document.addEventListener('DOMContentLoaded', async () => {
            await DataInitializationService.init();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/workspace-attachments.js"></script>
    <script src="js/taskLinks.js"></script>



    <script type="module">
        import * as Workspace from './js/workspace/index.js';
        window.Workspace = Workspace;
    </script>

    <script type="module" src="js/workspaceFlashcardIntegration.js"></script>
    <script type="module" src="js/sm2.js"></script>
    <script type="module" src="js/cross-tab-sync.js"></script>
</body>

</html>
