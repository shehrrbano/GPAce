<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPAce - Hustle Hub</title>
    <meta name="description"
        content="GPAce Hustle Hub - Manage your academic tasks, projects, and assignments efficiently.">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/components/navigation.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">
    <link href="css/extracted.css" rel="stylesheet">

    <!-- DOMPurify for sanitization -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
      #taskSections:empty::after {
        content: "Initializing system...";
        display: block;
        padding: 60px;
        text-align: center;
        color: var(--dd-text-muted);
        font-family: 'Inter', sans-serif;
      }
    </style>
</head>

<body id="hustle-hub-page" data-bg="deep">
    <!-- Navigation Bar (Handled by js/inject-header.js) -->

    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="projectsSidebar">
            <h5>Subjects</h5>
            <div id="projectList">
                <!-- Projects will be dynamically added here -->
            </div>
        </aside>

        <!-- Sidebar toggle button -->
        <button id="sidebarToggle" class="sidebar-toggle" data-action="toggle-sidebar" aria-label="Toggle sidebar">
            <i class="bi bi-chevron-left"></i>
        </button>

        <!-- Main Content -->
        <main class="main-content">
            <div id="taskContainer" class="fade-in">
                <!-- Project Header (Dynamic) -->
                <div id="projectHeader">
                    <!-- Dynamic header content -->
                </div>

                <!-- Section Navigation -->
                <nav class="section-nav" id="sectionNav">
                    <button class="btn active" data-action="select-section" data-section="all">
                        <i class="bi bi-grid-3x3-gap"></i> All Sections
                    </button>
                    <button class="btn" data-action="select-section" data-section="Revision">
                        <i class="bi bi-book"></i> Revision
                    </button>
                    <button class="btn" data-action="select-section" data-section="Assignment">
                        <i class="bi bi-file-earmark-text"></i> Assignment
                    </button>
                    <button class="btn" data-action="select-section" data-section="Quizzes">
                        <i class="bi bi-question-circle"></i> Quizzes
                    </button>
                    <button class="btn" data-action="select-section" data-section="Mid Term / OHT">
                        <i class="bi bi-bar-chart-steps"></i> Mid Term / OHT
                    </button>
                    <button class="btn" data-action="select-section" data-section="Finals">
                        <i class="bi bi-trophy"></i> Finals
                    </button>
                </nav>

                <!-- Add Task Placeholder -->
                <div class="add-task-placeholder" id="addTaskPlaceholder" data-action="show-task-form">
                    <i class="bi bi-plus-circle"></i>
                    <span>Add new task...</span>
                </div>

                <!-- Task Sections Container -->
                <div id="taskSections">
                    <!-- Tasks grouped by sections will appear here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Add Task Form Modal -->
    <div id="addTaskForm" class="modal fade" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add New Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Task Title</label>
                        <input type="text" id="taskTitle" class="form-control" placeholder="e.g. Study Chapter 5">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea id="taskDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Priority</label>
                            <select id="taskPriority" class="form-select">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Section</label>
                            <select id="taskSection" class="form-select">
                                <option value="Revision">Revision</option>
                                <option value="Assignment">Assignment</option>
                                <option value="Quizzes">Quizzes</option>
                                <option value="Mid Term / OHT">Mid Term / OHT</option>
                                <option value="Finals">Finals</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" data-action="add-task">Add Task</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Core Services Initialization Bridge -->
    <script type="module">
        import SemesterService from './js/services/SemesterService.js';
        import taskSystem from './js/core/TaskSystem.js';
        
        // Expose to window for controller synchronization
        window.SemesterService = SemesterService;
        window.TaskSystem = taskSystem;
        
        // Ensure services are initialized
        await Promise.all([
            SemesterService.initialize(),
            taskSystem.init()
        ]);
        
        console.log('[Bridge] Hustle Hub services ready');
        window.gpace_services_ready = true;
        window.dispatchEvent(new CustomEvent('gpace-ready'));
    </script>

    <!-- UI Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/core/BootstrapManager.js"></script>
    <script type="module" src="js/inject-header.js"></script>

    <!-- Page Controller -->
    <script type="module" src="js/controllers/TasksController.js"></script>
</body>

</html>
