<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Manifest & Branding -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b18">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/gpace-logo-white.png">
    <title>GPAce - Performance Tracker</title>
    <meta name="description"
        content="Track and manage your academic subject marks, weightages, and performance with GPAce.">

    <!-- Import Map for Firebase modules -->
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
        }
      }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- Stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/components/navigation.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">
    <link href="css/subject-marks-modern.css" rel="stylesheet">

    <!-- DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>

<body data-bg="deep">
    <!-- Navigation Bar (Injected by inject-header.js) -->

    <div class="marks-layout">
        <!-- Sidebar -->
        <aside class="subject-sidebar">
            <div id="subjectsList" class="subject-list">
                <div class="text-center p-3 text-muted">Syncing subjects...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="subjectDetails" class="marks-content">
            <div id="emptyState" class="content-placeholder">
                <i class="bi bi-graph-up-arrow"></i>
                <h3>Select a Subject</h3>
                <p>Choose a subject from the list to track your performance and marks.</p>
            </div>

            <div id="activeContent" class="d-none">
                <!-- Subject Header -->
                <div class="subject-header-row">
                    <h2 id="subjectName">Subject Name</h2>
                    <div class="header-percentage"><span id="academicPerformance">0</span>%</div>
                </div>
                <div class="header-divider"></div>

                <div class="marks-grid">
                    <!-- Left Column: Weightages -->
                    <div class="grid-column">
                        <h3>Weightages</h3>
                        <div class="weightages-box">
                            <div class="weightage-item">
                                <div class="weightage-label">Assignments (%)</div>
                                <div class="weightage-input-wrap"><input type="number" id="assignmentWeightage" class="weightage-input"></div>
                            </div>
                            <div class="weightage-item">
                                <div class="weightage-label">Quizzes (%)</div>
                                <div class="weightage-input-wrap"><input type="number" id="quizWeightage" class="weightage-input"></div>
                            </div>
                            <div class="weightage-item">
                                <div class="weightage-label">Mid Term / OHT (%)</div>
                                <div class="weightage-input-wrap"><input type="number" id="midtermWeightage" class="weightage-input"></div>
                            </div>
                            <div class="weightage-item">
                                <div class="weightage-label">Finals (%)</div>
                                <div class="weightage-input-wrap"><input type="number" id="finalWeightage" class="weightage-input"></div>
                            </div>
                            <div class="weightage-item">
                                <div class="weightage-label">Revision (%)</div>
                                <div class="weightage-input-wrap"><input type="number" id="revisionWeightage" class="weightage-input"></div>
                            </div>
                            <div class="weightages-footer">
                                <div class="total-weight-label">Total: <span id="totalWeightage">100</span>%</div>
                                <button id="saveWeightagesBtn" class="btn btn-primary btn-sm">Save Config</button>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column: Add New Mark -->
                    <div class="grid-column">
                        <h3>Add New Mark</h3>
                        <div class="add-mark-box">
                            <div class="add-mark-row">
                                <div class="form-field">
                                    <label>CATEGORY</label>
                                    <select id="markCategory">
                                        <option value="assignment">Assignment</option>
                                        <option value="quiz">Quiz</option>
                                        <option value="midterm">Mid Term</option>
                                        <option value="final">Final</option>
                                        <option value="revision">Revision</option>
                                    </select>
                                </div>
                                <div class="form-field">
                                    <label>TITLE</label>
                                    <input type="text" id="markTitle" placeholder="e.g. Quiz 1">
                                </div>
                            </div>
                            <div class="add-mark-row">
                                <div class="form-field">
                                    <label>OBTAINED</label>
                                    <input type="number" id="obtainedMarks" placeholder="0">
                                </div>
                                <div class="form-field">
                                    <label>TOTAL</label>
                                    <input type="number" id="totalMarks" placeholder="100">
                                </div>
                            </div>
                            <button id="addMarkBtn" class="btn-add-legacy">Add Entry</button>
                        </div>

                        <!-- Marks History Inside Right Column -->
                        <div class="history-section">
                            <h3>Marks History</h3>
                            <div id="existingMarks" class="history-list"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- GPA Predictor -->
    <div class="predictor-wrapper">
        <div id="gpaPredictorContainer"></div>
    </div>

    <!-- Core Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/inject-header.js"></script>

    <!-- Core Logic -->
    <script type="module">
        import { storageService } from './js/services/StorageService.js';
        import SemesterService from './js/services/SemesterService.js';
        import taskSystem from './js/core/TaskSystem.js';
        
        window.SemesterService = SemesterService;
        window.storageService = storageService;
        
        await Promise.all([
            SemesterService.initialize(),
            taskSystem.init()
        ]);
        
        window.dispatchEvent(new CustomEvent('gpace-ready'));
    </script>

    <!-- UI Controllers -->
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/firestore-global.js"></script>
    <script type="module" src="js/subject-marks-ui.js"></script>
    <script type="module" src="js/gpa-predictor.js"></script>

    <script>
        window.addEventListener('load', () => {
            const check = setInterval(() => {
                if (typeof window.initGPAPredictor === 'function') {
                    window.initGPAPredictor('gpaPredictorContainer');
                    clearInterval(check);
                }
            }, 100);
            setTimeout(() => clearInterval(check), 5000);
        });
    </script>
</body>

</html>
