<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PWA Manifest & Branding -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b18">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/gpace-logo-white.png">
    <title>GPAce - Academic Details</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="GPAce Academic Details - Manage your semesters, subjects, and academic progress with AI-powered insights.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="css/design-tokens.css" />
    <link rel="stylesheet" href="css/components/navigation.css" />
    <link rel="stylesheet" href="css/sideDrawer.css" />
    <link rel="stylesheet" href="css/academic-details.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="assets/images/gpace-logo-white.webp">
    
    <style>
      body {
        padding-top: var(--nav-height, 72px);
      }
    </style>
</head>

<body data-bg="deep">
    <div id="root"></div>

    <!-- React Stack -->
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

    <!-- ESM Bridge -->
    <script type="module">
        try {
            const { default: SemesterService } = await import('./js/services/SemesterService.js');
            const { saveSubjectsToFirestore } = await import('./js/firestore.js');
            const { default: storageService } = await import('./js/services/StorageService.js');
            
            window.SemesterService = SemesterService;
            window.saveSubjectsToFirestore = saveSubjectsToFirestore;
            window.storageService = storageService;
            
            window.dispatchEvent(new CustomEvent('gpace-ready'));
        } catch (e) { console.error('[Bridge] Error:', e); }
    </script>

    <!-- React Logic -->
    <script src="js/academic-details.js"></script>

    <!-- Core Services -->
    <script type="module" src="js/services/StorageService.js"></script>
    <script type="module" src="js/services/SemesterService.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/firestore.js"></script>
    <script type="module" src="js/ui-utilities.js"></script>
    <script type="module" src="js/core/BootstrapManager.js"></script>
    <script type="module" src="js/inject-header.js"></script>
</body>

</html>
