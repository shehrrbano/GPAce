<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Manifest & Branding -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050b18">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="assets/images/gpace-logo-white.png">
    <title>Settings - GPAce</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Configure GPAce settings, manage quotes, and role models for your academic journey.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/grind-react.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">
    <link href="css/settings.css" rel="stylesheet">
</head>

<body>
    <!-- Navigation Bar (will be replaced by inject-header.js) -->
    <!-- Sound Controls -->
    <div class="sound-controls">
        <button id="toggleSound" class="sound-toggle" aria-label="Toggle Sound Effects">
            <span class="sound-icon">🔊</span>
        </button>
    </div>

    <!-- Main Content Container -->
    <main class="container" id="main-content">
        <header class="settings-header">
            <h1 class="brand-name">Settings</h1>
            <p class="kicker">Personalize Your GPAce Experience</p>
        </header>

        <div class="settings-grid">
            <!-- Quotes Management Section -->
            <section class="quotes-section card" aria-labelledby="quotes-heading">
                <h2 id="quotes-heading"><i class="bi bi-chat-quote-fill"></i> Quotes Management</h2>
                <div class="quote-input-container">
                    <div class="input-group">
                        <label for="quoteText" class="kicker">Quote Content</label>
                        <input type="text" id="quoteText" placeholder="Enter quote text" aria-label="Quote text">
                    </div>
                    <div class="input-group">
                        <label for="quoteAuthor" class="kicker">Author</label>
                        <input type="text" id="quoteAuthor" placeholder="Quote author" aria-label="Quote author">
                    </div>
                    <div class="input-group">
                        <label for="quoteImage" class="kicker">Image URL</label>
                        <input type="url" id="quoteImage" placeholder="Optional image URL" aria-label="Optional image URL">
                    </div>
                    <button class="interactive-button" id="addQuoteBtn" aria-label="Add new quote">
                        <i class="bi bi-plus-lg"></i> Add Quote
                    </button>
                </div>
                <div id="quoteList" class="quote-list" role="list" aria-label="Saved quotes"></div>
            </section>

            <!-- Role Models Section -->
            <section class="role-models-section card" aria-labelledby="rolemodels-heading">
                <h2 id="rolemodels-heading"><i class="bi bi-star-fill"></i> Role Models</h2>
                <div class="role-model-input-container">
                    <div class="input-group">
                        <label for="roleModelName" class="kicker">Model Name</label>
                        <input type="text" id="roleModelName" placeholder="Role model name" aria-label="Role model name">
                    </div>
                    <div class="input-group">
                        <label for="roleModelImage" class="kicker">Image URL</label>
                        <input type="url" id="roleModelImage" placeholder="Role model image URL"
                            aria-label="Role model image URL">
                    </div>
                    <button class="interactive-button" id="addRoleModelBtn" aria-label="Add new role model">
                        <i class="bi bi-plus-lg"></i> Add Role Model
                    </button>
                </div>
                <div id="roleModelList" class="role-model-list" role="list" aria-label="Saved role models"></div>
                <div id="roleModelResearch" class="role-model-research" aria-live="polite"></div>
            </section>
        </div>
    </main>

    <!-- Scripts - Loaded in correct dependency order -->
    <!-- Bootstrap JS (load first - other scripts may depend on it) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core Services (loaded first) -->
    <script type="module" src="js/core/BootstrapManager.js"></script>
    <script type="module" src="js/services/StorageService.js"></script>
    <script type="module" src="js/services/SecureStorage.js"></script>
    <script type="module" src="js/utils/Sanitizer.js"></script>
    <script type="module" src="js/utils/Logger.js"></script>

    <!-- Authentication (must load before sideDrawer) -->
    <script type="module" src="js/auth.js"></script>

    <!-- Sound & Transition Managers -->
    <script src="js/soundManager.js"></script>
    <script src="js/transitionManager.js"></script>

    <!-- Feature Managers -->
    <script src="js/themeManager.js"></script>
    <script src="js/quoteManager.js"></script>
    <script src="js/roleModelManager.js"></script>

    <!-- Gemini API for Role Model Research -->
    <script src="js/gemini-api.js"></script>


    <!-- Cross-tab Sync -->
    <script type="module" src="js/cross-tab-sync.js"></script>

    <!-- Side Drawer & Navigation (load last) -->
    <script type="module" src="js/sideDrawer.js"></script>
    <script type="module" src="js/inject-header.js"></script>
</body>

</html>
