<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPAce - Priority List</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Side Drawer Styles -->
    <link href="css/sideDrawer.css" rel="stylesheet">
    <!-- Priority List Styles -->
    <link href="css/priority-list.css" rel="stylesheet">
</head>

<body>
    <!-- Navigation Bar -->
    <div class="container mt-4">
        <div class="list-header">
            <div class="priority-score">Priority</div>
            <div class="task-title">Task</div>
            <div class="task-section">Section</div>
            <div class="project-name">Project</div>
            <div class="due-date">Due Date</div>
        </div>

        <div class="task-navigation">
            <button onclick="navigateTask('prev')" class="nav-arrow" title="Previous Task">
                <i class="bi bi-chevron-left"></i>
            </button>
            <span class="navigation-text">Navigate Tasks</span>
            <button onclick="navigateTask('next')" class="nav-arrow" title="Next Task">
                <i class="bi bi-chevron-right"></i>
            </button>
        </div>

        <div id="taskList">
            <!-- Tasks will be populated here -->
        </div>
    </div>

    <a href="priority-calculator.html" class="back-button">
        <i class="bi bi-arrow-left"></i> Back to Calculator
    </a>

    <!-- Firebase Initialization -->
    <script type="module">
        import { initializeApp, getApps, getApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { firebaseConfig, getOrCreateFirebaseApp } from './js/firebaseConfig.js';

        // Initialize Firebase safely using centralized helper
        const app = await getOrCreateFirebaseApp(initializeApp, getApps);
        console.log("Firebase initialized via helper:", app ? "success" : "failed");

        // Set up global variables with guards
        if (app) {
            if (!window.db) window.db = getFirestore(app);
            if (!window.auth) window.auth = getAuth(app);
        }
    </script>

    <!-- Authentication Setup -->
    <script type="module">
        import { auth as importedAuth, signInWithGoogle, signOutUser, initializeAuth } from './js/auth.js';
        window.auth = window.auth || importedAuth;
        window.signInWithGoogle = signInWithGoogle;
        window.signOutUser = signOutUser;

        // Initialize authentication
        document.addEventListener('DOMContentLoaded', () => {
            initializeAuth();
        });
    </script>

    <!-- Firestore Data Operations -->
    <script type="module">
        import { initializeFirestoreData } from './js/initFirestoreData.js';
        window.initializeFirestoreData = initializeFirestoreData;

        // Initialize data when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (typeof window.initializeFirestoreData === 'function') {
                    window.initializeFirestoreData();
                }
            }, 1500);
        });
    </script>

    <!-- Global getStorage singleton - MUST be defined before any scripts that use it -->
    <script>
        if (typeof window.getStorage === 'undefined') {
            window.getStorage = () => window.StorageService || {
                get: (k, d) => { try { return JSON.parse(localStorage.getItem(k)) ?? d; } catch { return d; } },
                set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
            };
        }
    </script>

    <script type="module" src="js/common.js"></script>
    <script type="module" src="js/cross-tab-sync.js"></script>
    <script type="module" src="js/priority-sync-fix.js"></script>
    <script src="js/priority-list-sorting.js"></script>
    <script type="module" src="js/priority-list-utils.js"></script>
    <script type="module" src="js/sideDrawer.js"></script>
    <script type="module" src="/js/inject-header.js"></script>
</body>

</html>
