<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPAce - Sleep Saboteurs</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Set and manage alarms to protect your sleep schedule with GPAce Sleep Saboteurs. Never oversleep again!">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/gpace-logo-white.png">
    <link rel="shortcut icon" type="image/png" href="assets/images/gpace-logo-white.png">

    <!-- CSS Dependencies -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/design-tokens.css" rel="stylesheet">
    <link href="css/sideDrawer.css" rel="stylesheet">
    <link href="css/alarm-service.css" rel="stylesheet">
    <link href="css/sleep-saboteurs.css" rel="stylesheet">
</head>

<body>
    <!-- Navigation Bar (will be replaced by inject-header.js) -->
    <!-- Time Format Toggle -->
    <button class="time-format-toggle" aria-label="Toggle time format between 12-hour and 24-hour">
        <i class="bi bi-clock" aria-hidden="true"></i>
        <span class="format-text">24hr</span>
    </button>

    <!-- Main Container -->
    <main class="container mt-5" id="main-content">
        <div class="alarm-container">
            <!-- Clock Display -->
            <div class="clock" role="timer" aria-label="Current time">
                <span class="hour" aria-label="Hours">00</span>
                <span class="colon" aria-hidden="true">:</span>
                <span class="minute" aria-label="Minutes">00</span>
                <span class="colon" aria-hidden="true">:</span>
                <div class="side">
                    <span class="second" aria-label="Seconds">00</span>
                    <span class="am-pm">AM</span>
                </div>
            </div>

            <!-- Date Display -->
            <div class="days" role="status" aria-label="Current date">
                <span class="month">Jan</span>
                <span class="day">Monday</span>
                <span class="date">01</span>
            </div>

            <!-- Add Alarm Button -->
            <button id="addAlarmBtn" class="btn alarm-button" aria-label="Add new alarm">
                <i class="bi bi-plus-circle-fill me-2" aria-hidden="true"></i>Add Alarm
            </button>

            <!-- Alarm Form -->
            <div class="alarm-form" role="form" aria-label="Set alarm form">
                <label id="alarm-time-label">Set Alarm Time</label>
                <div class="time-inputs">
                    <div class="input-field">
                        <label for="hour" class="visually-hidden">Hour (1-12)</label>
                        <input type="number" id="hour" name="hour" min="1" max="12" placeholder="Hour" required>
                    </div>
                    <div class="input-field">
                        <label for="minute" class="visually-hidden">Minutes (0-59)</label>
                        <input type="number" id="minute" name="minute" min="0" max="59" placeholder="Min" required>
                    </div>
                    <div class="input-field">
                        <label for="second" class="visually-hidden">Seconds (0-59)</label>
                        <input type="number" id="second" name="second" min="0" max="59" placeholder="Sec" required>
                    </div>
                </div>

                <div class="am-pm-toggle" role="radiogroup" aria-label="AM or PM selection">
                    <button type="button" class="am-btn active" role="radio" aria-checked="true">AM</button>
                    <button type="button" class="pm-btn" role="radio" aria-checked="false">PM</button>
                </div>

                <div class="label-input">
                    <label for="alarm-label-input">Alarm Label</label>
                    <input type="text" id="alarm-label-input" name="alarmLabel" placeholder="Enter alarm label"
                        aria-describedby="label-hint">
                    <span id="label-hint" class="visually-hidden">Optional name for your alarm</span>
                </div>

                <div class="alarm-actions">
                    <button type="button" class="set-alarm-btn" aria-label="Confirm and set alarm">Set Alarm</button>
                    <button type="button" class="cancel-alarm-btn" aria-label="Cancel alarm creation">Cancel</button>
                </div>
            </div>

            <!-- Alarm List -->
            <div class="alarm-list" id="alarm-list" role="list" aria-label="Saved alarms">
                <!-- Alarms will be added here dynamically -->
            </div>
        </div>
    </main>

    <!-- Wave Animation Container -->
    <div class="wave-container" aria-hidden="true">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <!-- Keyboard Shortcuts Tooltip -->
    <div class="keyboard-shortcut" role="note" aria-label="Keyboard shortcuts">
        <span><kbd>Alt</kbd> + <kbd>A</kbd> Quick Add</span>
        <span><kbd>Alt</kbd> + <kbd>T</kbd> Templates</span>
        <span><kbd>Alt</kbd> + <kbd>B</kbd> Bulk Add</span>
    </div>

    <!-- Audio Elements -->
    <audio id="alarm-sound" preload="auto">
        <source src="alarm-sounds/alexa-ringtone.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <!-- Scripts - Loaded in correct dependency order -->
    <!-- Bootstrap JS (load first) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Core Services (loaded first) -->
    <script type="module" src="js/services/StorageService.js"></script>
    <script type="module" src="js/services/SecureStorage.js"></script>
    <script type="module" src="js/utils/Sanitizer.js"></script>
    <script type="module" src="js/utils/Logger.js"></script>
    <script type="module" src="js/services/StorageService.js"></script>

    <!-- Authentication (handles Firebase internally) -->
    <script type="module" src="js/auth.js"></script>

    <!-- Firestore Data -->
    <script type="module" src="js/initFirestoreData.js"></script>

    <!-- Feature Scripts -->
    <script src="js/alarm-service.js"></script>
    <script src="js/clock-display.js"></script>
    <script src="js/theme-manager.js"></script>
    <script src="js/sleep-saboteurs-init.js"></script>

    <!-- Cross-tab Sync -->
    <script type="module" src="js/cross-tab-sync.js"></script>

    <!-- Side Drawer & Navigation (load last) -->
    <script type="module" src="js/sideDrawer.js"></script>
    <script type="module" src="js/inject-header.js"></script>
</body>

</html>
